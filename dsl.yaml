default:
  margin:
    percent: 4
  colors:
    foreground: "4c4f69"
    background: "eff1f5"

slide_title:
  alignment: center
  padding_bottom: 1
  padding_top: 1
  separator: true
  colors:
    foreground: "34495E"
  bold: true

code:
  alignment: center
  minimum_size: 50
  minimum_margin:
    percent: 8
  theme_name: GitHub
  padding:
    horizontal: 2
    vertical: 1

execution_output:
  colors:
    foreground: "4c4f69"
    background: "ccd0da"

inline_code:
  colors:
    foreground: "40a02b"

intro_slide:
  title:
    alignment: center
    colors:
      foreground: "d6002b"
  subtitle:
    alignment: center
    colors:
      foreground: "209fb5"
  author:
    alignment: center
    colors:
      foreground: "5c5f77"
    positioning: page_bottom
  event:
    alignment: center
  date:
    alignment: center
  location:
    alignment: center

headings:
  h1:
    prefix: "██"
    colors:
      foreground: "85929e"
  h2:
    prefix: "▓▓▓"
    colors:
      foreground: "566573"
  h3:
    prefix: "▒▒▒▒"
    colors:
      foreground: "273746"
  h4:
    prefix: "░░░░░"
    colors:
      foreground: "1c2833"
  h5:
    prefix: "░░░░░░"
    colors:
      foreground: "95a5a6"
  h6:
    prefix: "░░░░░░░"
    colors:
      foreground: "717d7e"

block_quote:
  prefix: "▍ "
  colors:
    foreground: "4c4f69"
    background: "ccd0da"
    prefix: "df8e1d"

typst:
  colors:
    foreground: "4c4f69"
    background: "ccd0da"

footer:
  style: progress_bar
  colors:
    background: "666666"

modals:
  selection_colors:
    foreground: "209fb5"
